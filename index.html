<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web Pulse — what the world is doing on the web</title>
  <meta name="description" content="A daily snapshot of what people are reading, discussing, and building across the web." />
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --card-hover: #1a1a1a;
      --border: #262626;
      --text: #e8e8e8;
      --muted: #888;
      --dim: #555;
      --accent: #f5a524;
      --up: #22c55e;
      --down: #ef4444;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafafa;
        --card: #fff;
        --card-hover: #f4f4f4;
        --border: #e5e5e5;
        --text: #111;
        --muted: #666;
        --dim: #999;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }
    header.site {
      padding: 28px 24px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header.site h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    header.site h1 span.dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: 2px;
    }
    header.site .meta {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    main {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .tile {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 400px;
      max-height: 600px;
    }
    .tile header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .tile h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--text);
    }
    .tile .stamp {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    .tile .body {
      overflow-y: auto;
      flex: 1;
    }
    .tile .body::-webkit-scrollbar { width: 8px; }
    .tile .body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .item {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: var(--card-hover); }
    .item .rank {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      padding-top: 1px;
    }
    .item .title {
      font-size: 13px;
      line-height: 1.4;
    }
    .item .title a {
      color: var(--text);
      text-decoration: none;
    }
    .item .title a:hover { color: var(--accent); }
    .item .sub {
      margin-top: 3px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .item .metric {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 1px;
    }

    .tile.error .body, .tile.empty .body {
      padding: 20px 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .sparkline {
      display: inline-block;
      vertical-align: middle;
      margin-left: 6px;
    }
    .sparkline path.line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.2;
      opacity: 0.75;
    }

    .delta { font-family: var(--mono); font-size: 11px; padding: 1px 5px; border-radius: 4px; margin-left: 6px; }
    .delta.up   { color: var(--up); }
    .delta.down { color: var(--down); }
    .delta.flat { color: var(--dim); }
    .badge { font-family: var(--mono); font-size: 10px; text-transform: uppercase; padding: 1px 5px; border-radius: 3px; margin-left: 6px; letter-spacing: 0.04em; }
    .badge.new    { background: var(--accent); color: var(--bg); }
    .badge.streak { background: var(--border); color: var(--muted); }

    .view-toggle { display: flex; gap: 4px; }
    .view-toggle button {
      font-family: var(--mono); font-size: 11px; padding: 4px 10px;
      border: 1px solid var(--border); border-radius: 5px;
      background: transparent; color: var(--muted); cursor: pointer;
    }
    .view-toggle button:hover { color: var(--text); }
    .view-toggle button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    .tile-wide { grid-column: 1 / -1; max-height: 320px; }
    .cluster-row {
      display: grid; grid-template-columns: 28px 1fr auto; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border); align-items: start;
    }
    .cluster-row:last-child { border-bottom: none; }
    .cluster-row:hover { background: var(--card-hover); }
    .badge-src {
      display: inline-block; font-family: var(--mono); font-size: 10px;
      padding: 1px 6px; border-radius: 3px; margin-right: 4px; margin-top: 3px;
    }
    .badge-src a { color: inherit; text-decoration: none; }
    .badge-src a:hover { text-decoration: underline; }
    .badge-wikipedia        { background: #1a3a1a; color: #4ade80; }
    .badge-hackernews       { background: #3a2a1a; color: #fb923c; }
    .badge-reddit           { background: #3a1a1a; color: #f87171; }
    .badge-github           { background: #2a2a2a; color: #a3a3a3; }
    .badge-google-trends    { background: #1a1a3a; color: #60a5fa; }
    .badge-cloudflare-radar { background: #2a1a3a; color: #c084fc; }
    .badge-gdelt           { background: #1a2a3a; color: #38bdf8; }
    .badge-stackoverflow   { background: #3a2a1a; color: #f59e0b; }
    .badge-steam           { background: #1a2a2a; color: #2dd4bf; }
    .badge-youtube         { background: #3a1a1a; color: #fb7185; }
    .badge-bluesky         { background: #1a1a3a; color: #818cf8; }
    @media (prefers-color-scheme: light) {
      .badge-wikipedia        { background: #dcfce7; color: #166534; }
      .badge-hackernews       { background: #ffedd5; color: #9a3412; }
      .badge-reddit           { background: #fee2e2; color: #991b1b; }
      .badge-github           { background: #f5f5f5; color: #404040; }
      .badge-google-trends    { background: #dbeafe; color: #1e40af; }
      .badge-cloudflare-radar { background: #f3e8ff; color: #6b21a8; }
      .badge-gdelt           { background: #e0f2fe; color: #0369a1; }
      .badge-stackoverflow   { background: #fef3c7; color: #92400e; }
      .badge-steam           { background: #ccfbf1; color: #115e59; }
      .badge-youtube         { background: #ffe4e6; color: #9f1239; }
      .badge-bluesky         { background: #e0e7ff; color: #3730a3; }
    }

    .filter-bar {
      padding: 12px 20px; display: flex; flex-wrap: wrap; gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .filter-bar button {
      font-family: var(--mono); font-size: 12px; padding: 4px 12px;
      border-radius: 14px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
    }
    .filter-bar button:hover { border-color: var(--accent); color: var(--text); }
    .filter-bar button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    #search {
      font-family: var(--mono); font-size: 13px; padding: 6px 12px;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg); color: var(--text); width: 200px; outline: none;
    }
    #search:focus { border-color: var(--accent); }
    .item.search-hidden { display: none; }
    .tile.filtered-empty .body::after {
      content: "No matches"; display: block; padding: 20px 16px;
      color: var(--muted); font-size: 13px;
    }

    .brief {
      max-width: 1600px; margin: 0 auto; padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .brief-label {
      margin: 0 0 4px; font-family: var(--mono); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted);
    }
    .brief-text { margin: 0; font-size: 14px; line-height: 1.6; color: var(--text); }

    .history-view { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .history-header { margin-bottom: 24px; }
    .back-link { font-family: var(--mono); font-size: 12px; color: var(--muted); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .history-view h2 { font-size: 18px; margin: 8px 0 4px; }
    .history-meta { font-family: var(--mono); font-size: 12px; color: var(--muted); margin: 0; }
    .history-chart {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px; margin-bottom: 20px;
    }
    .history-items {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .history-items h3 {
      font-size: 13px; text-transform: uppercase; letter-spacing: 0.02em;
      padding: 14px 16px; margin: 0; border-bottom: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      #search { width: 100%; }
      header.site { flex-direction: column; }
    }

    footer {
      padding: 28px 24px 40px;
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <header class="site">
    <h1><span class="dot"></span>Web Pulse</h1>
    <div class="view-toggle">
      <button data-view="today" class="active">Today</button>
      <button data-view="week">This week</button>
    </div>
    <input type="search" id="search" placeholder="Search everything..." autocomplete="off" />
    <div class="meta" id="generated">—</div>
  </header>

  <nav class="filter-bar" id="filter-bar">
    <button data-filter="all" class="active">All</button>
    <button data-filter="tech">Tech</button>
    <button data-filter="news">News</button>
    <button data-filter="entertainment">Entertainment</button>
    <button data-filter="gaming">Gaming</button>
    <button data-filter="social">Social</button>
    <button data-filter="global">Global</button>
  </nav>

  <section class="brief" id="brief" style="display:none">
    <p class="brief-label">Today's brief</p>
    <p class="brief-text" id="brief-text"></p>
  </section>

  <main id="grid"></main>

  <footer>
    auto-refreshes daily · <a id="repo-link" href="#" target="_blank" rel="noopener">source</a>
  </footer>

  <script type="module">
    // ---- helpers -----------------------------------------------------------
    const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]))
    const fmt = (n) => {
      if (n == null) return ""
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, "") + "M"
      if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, "") + "k"
      return String(n)
    }
    const rel = (iso) => {
      if (!iso) return "\u2014"
      const d = new Date(iso)
      const diff = (Date.now() - d.getTime()) / 1000
      if (diff < 60) return `${Math.round(diff)}s ago`
      if (diff < 3600) return `${Math.round(diff / 60)}m ago`
      if (diff < 86400) return `${Math.round(diff / 3600)}h ago`
      return `${Math.round(diff / 86400)}d ago`
    }

    // ---- sparkline ---------------------------------------------------------
    function sparkline(values, w = 48, h = 16) {
      if (!values || values.length < 2) return ""
      const min = Math.min(...values)
      const max = Math.max(...values)
      const range = max - min || 1
      const step = w / (values.length - 1)
      const pts = values.map((v, i) => {
        const x = i * step
        const y = h - ((v - min) / range) * h
        return `${x.toFixed(1)},${y.toFixed(1)}`
      })
      return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path class="line" d="M${pts.join(" L")}"/></svg>`
    }

    // ---- identity & metrics ------------------------------------------------
    function itemKey(source, item) {
      switch (source) {
        case "wikipedia":        return item.title
        case "hackernews":       return `hn:${item.url || item.hn_url}`
        case "reddit":           return `reddit:${item.url}`
        case "github":           return item.title
        case "google-trends":    return item.title.toLowerCase()
        case "cloudflare-radar": return item.title
        case "gdelt":            return item.url
        case "stackoverflow":    return item.url
        case "steam":            return item.title
        case "youtube":          return item.url
        case "bluesky":          return item.url
        default:                 return item.title
      }
    }

    function metricFor(source, item) {
      switch (source) {
        case "wikipedia":        return item.views
        case "hackernews":       return item.score
        case "reddit":           return item.score
        case "github":           return item.stars_today
        case "google-trends":    return item.geos?.length
        case "cloudflare-radar": return undefined
        case "gdelt":            return undefined
        case "stackoverflow":    return item.score
        case "steam":            return item.players
        case "youtube":          return item.views
        case "bluesky":          return item.likes
        default:                 return undefined
      }
    }

    // ---- badges ------------------------------------------------------------
    function badges(item) {
      let html = ""
      if (item.delta != null) {
        if (item.delta < 0) html += `<span class="delta up">\u2191${Math.abs(item.delta)}</span>`
        else if (item.delta > 0) html += `<span class="delta down">\u2193${item.delta}</span>`
        else html += `<span class="delta flat">\u2014</span>`
      }
      if (item.isNew) html += `<span class="badge new">NEW</span>`
      if (item.streak >= 3) html += `<span class="badge streak">streak ${item.streak}d</span>`
      return html
    }

    function rankSpark(item) {
      const valid = item.series?.filter(v => v != null) || []
      // negate ranks so lower rank (better) = higher sparkline position
      return valid.length >= 2 ? sparkline(valid.map(v => -v)) : ""
    }

    // ---- load history for all sources --------------------------------------
    const _historyCache = new Map()

    async function loadHistory(days = 7) {
      const result = {}
      const today = new Date()
      const fetches = []

      for (const source of ORDER) {
        result[source] = {}
        for (let i = days - 1; i >= 0; i--) {
          const d = new Date(today)
          d.setUTCDate(d.getUTCDate() - i)
          const stamp = d.toISOString().slice(0, 10)
          const url = `data/history/${source}/${stamp}.json`
          fetches.push({ source, stamp, url })
        }
      }

      const responses = await Promise.allSettled(
        fetches.map(async ({ url }) => {
          if (_historyCache.has(url)) return _historyCache.get(url)
          const r = await fetch(url, { cache: "no-store" })
          if (!r.ok) return null
          const data = await r.json()
          _historyCache.set(url, data)
          return data
        })
      )

      responses.forEach((r, idx) => {
        if (r.status !== "fulfilled" || !r.value) return
        const { source, stamp } = fetches[idx]
        const data = r.value
        for (const item of data.items || []) {
          const key = itemKey(source, item)
          if (!result[source][key]) result[source][key] = []
          result[source][key].push({
            date: stamp,
            rank: item.rank,
            metric: metricFor(source, item),
            _item: item,
          })
        }
      })

      return result
    }

    // ---- annotate items with history data ----------------------------------
    function annotate(source, todayItems, history) {
      const sourceHist = history[source] || {}

      // Collect all dates present in this source's history
      const allDates = new Set()
      for (const entries of Object.values(sourceHist)) {
        for (const e of entries) allDates.add(e.date)
      }
      const sortedDates = [...allDates].sort()
      const todayStr = new Date().toISOString().slice(0, 10)

      return todayItems.map((item) => {
        const key = itemKey(source, item)
        const entries = sourceHist[key] || []

        // Find yesterday's entry (most recent history entry before today)
        const pastEntries = entries.filter(e => e.date < todayStr)
        const yesterday = pastEntries.length > 0 ? pastEntries[pastEntries.length - 1] : null
        const delta = yesterday ? item.rank - yesterday.rank : null

        // isNew: not present in any of last 3 days of past history
        const pastDates = sortedDates.filter(d => d < todayStr)
        const last3Days = pastDates.slice(-3)
        const isNew = last3Days.length > 0 &&
          !pastEntries.some(e => last3Days.includes(e.date))

        // streak: consecutive days including today, walking backwards
        let streak = 1
        const entryDates = new Set(entries.map(e => e.date))
        for (let i = pastDates.length - 1; i >= 0; i--) {
          if (entryDates.has(pastDates[i])) streak++
          else break
        }

        // series: rank values for last 7 days, oldest first, null for gaps
        const entryByDate = new Map(entries.map(e => [e.date, e]))
        const last7 = [...pastDates.slice(-6), todayStr]
        const series = last7.map(d => {
          if (d === todayStr) return item.rank
          const e = entryByDate.get(d)
          return e ? e.rank : null
        })

        return { ...item, delta, isNew, streak, series }
      })
    }

    // ---- week aggregation --------------------------------------------------
    function aggregateWeek(source, history) {
      const sourceHist = history[source] || {}
      const aggregated = []

      for (const [key, entries] of Object.entries(sourceHist)) {
        if (entries.length === 0) continue
        const appearances = entries.length
        const avgRank = entries.reduce((sum, e) => sum + e.rank, 0) / entries.length
        const latest = entries[entries.length - 1]
        aggregated.push({
          ...latest._item,
          appearances,
          avgRank,
          _weekItem: true,
        })
      }

      aggregated.sort((a, b) => b.appearances - a.appearances || a.avgRank - b.avgRank)
      return aggregated.slice(0, 25).map((it, i) => ({ ...it, rank: i + 1 }))
    }

    // ---- per-source renderers ---------------------------------------------
    const renderers = {
      wikipedia(data, ann) {
        return (ann || data.items).map((it) => `
          <div class="item">
            <div class="rank">${it.rank}</div>
            <div>
              <div class="title"><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>${rankSpark(it)}${badges(it)}</div>
              <div class="sub">${fmt(it.views)} views</div>
            </div>
            <div class="metric">${it._weekItem ? `${it.appearances}d` : fmt(it.views)}</div>
          </div>`).join("")
      },
      hackernews(data, ann) {
        return (ann || data.items).map((it) => `
          <div class="item">
            <div class="rank">${it.rank}</div>
            <div>
              <div class="title"><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>${rankSpark(it)}${badges(it)}</div>
              <div class="sub">${it.score} pts · <a href="${esc(it.hn_url)}" target="_blank" rel="noopener" style="color:inherit">${it.comments} comments</a> · ${esc(it.author)}</div>
            </div>
            <div class="metric">${it._weekItem ? `${it.appearances}d` : it.score}</div>
          </div>`).join("")
      },
      reddit(data, ann) {
        return (ann || data.items).map((it) => `
          <div class="item">
            <div class="rank">${it.rank}</div>
            <div>
              <div class="title"><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>${rankSpark(it)}${badges(it)}</div>
              <div class="sub">${esc(it.subreddit)} · ${fmt(it.score)} · ${it.comments} comments</div>
            </div>
            <div class="metric">${it._weekItem ? `${it.appearances}d` : fmt(it.score)}</div>
          </div>`).join("")
      },
      github(data, ann) {
        return (ann || data.items).map((it) => `
          <div class="item">
            <div class="rank">${it.rank}</div>
            <div>
              <div class="title"><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>${rankSpark(it)}${badges(it)}</div>
              <div class="sub">${esc(it.language || "\u2014")} · ${esc(it.description || "").slice(0, 110)}</div>
            </div>
            <div class="metric">${it._weekItem ? `${it.appearances}d` : (it.stars_today != null ? `+${fmt(it.stars_today)}` : fmt(it.stars))}</div>
          </div>`).join("")
      },
      "google-trends"(data, ann) {
        return (ann || data.items).map((it) => `
          <div class="item">
            <div class="rank">${it.rank}</div>
            <div>
              <div class="title">${it.news_url ? `<a href="${esc(it.news_url)}" target="_blank" rel="noopener">${esc(it.title)}</a>` : esc(it.title)}${rankSpark(it)}${badges(it)}</div>
              <div class="sub">${it.geos?.join(" · ") || ""}${it.news_source ? ` · ${esc(it.news_source)}` : ""}</div>
            </div>
            <div class="metric">${it._weekItem ? `${it.appearances}d` : `${it.geos?.length || 0}\u00d7`}</div>
          </div>`).join("")
      },
      "cloudflare-radar"(data, ann) {
        if (data.configured === false) {
          return `<div style="padding:20px 16px;color:var(--muted);font-size:13px">
            ${esc(data.message || "Not configured.")}
          </div>`
        }
        return (ann || data.items).map((it) => `
          <div class="item">
            <div class="rank">${it.rank}</div>
            <div>
              <div class="title"><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>${rankSpark(it)}${badges(it)}</div>
              ${it.category ? `<div class="sub">${esc(it.category)}</div>` : ""}
            </div>
            <div class="metric">${it._weekItem ? `${it.appearances}d` : ""}</div>
          </div>`).join("")
      },
      gdelt(data, ann) {
        return (ann || data.items).map((it) => `
          <div class="item">
            <div class="rank">${it.rank}</div>
            <div>
              <div class="title"><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>${rankSpark(it)}${badges(it)}</div>
              <div class="sub">${esc(it.domain || "")}${it.source_country ? ` · ${esc(it.source_country)}` : ""}</div>
            </div>
            <div class="metric">${it._weekItem ? `${it.appearances}d` : ""}</div>
          </div>`).join("")
      },
      stackoverflow(data, ann) {
        return (ann || data.items).map((it) => `
          <div class="item">
            <div class="rank">${it.rank}</div>
            <div>
              <div class="title"><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>${rankSpark(it)}${badges(it)}</div>
              <div class="sub">${(it.tags || []).slice(0, 3).join(" \u00b7 ")}</div>
            </div>
            <div class="metric">${it._weekItem ? `${it.appearances}d` : it.score}</div>
          </div>`).join("")
      },
      steam(data, ann) {
        return (ann || data.items).map((it) => `
          <div class="item">
            <div class="rank">${it.rank}</div>
            <div>
              <div class="title"><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>${rankSpark(it)}${badges(it)}</div>
              <div class="sub">${fmt(it.players)} players</div>
            </div>
            <div class="metric">${it._weekItem ? `${it.appearances}d` : fmt(it.players)}</div>
          </div>`).join("")
      },
      youtube(data, ann) {
        if (data.configured === false) {
          return `<div style="padding:20px 16px;color:var(--muted);font-size:13px">
            ${esc(data.message || "Not configured.")}
          </div>`
        }
        return (ann || data.items).map((it) => `
          <div class="item">
            <div class="rank">${it.rank}</div>
            <div>
              <div class="title"><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>${rankSpark(it)}${badges(it)}</div>
              <div class="sub">${esc(it.channel || "")}</div>
            </div>
            <div class="metric">${it._weekItem ? `${it.appearances}d` : fmt(it.views)}</div>
          </div>`).join("")
      },
      bluesky(data, ann) {
        return (ann || data.items).map((it) => `
          <div class="item">
            <div class="rank">${it.rank}</div>
            <div>
              <div class="title"><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>${rankSpark(it)}${badges(it)}</div>
              <div class="sub">@${esc(it.author || "")} \u00b7 ${fmt(it.likes)} likes</div>
            </div>
            <div class="metric">${it._weekItem ? `${it.appearances}d` : fmt(it.likes)}</div>
          </div>`).join("")
      },
    }

    // ---- layout ------------------------------------------------------------
    // ---- cluster renderer ---------------------------------------------------
    const SOURCE_LABELS = {
      "wikipedia": "Wikipedia", "hackernews": "HN", "reddit": "Reddit",
      "github": "GitHub", "google-trends": "Trends", "cloudflare-radar": "Radar",
      "gdelt": "GDELT", "stackoverflow": "SO", "steam": "Steam",
      "youtube": "YouTube", "bluesky": "Bluesky",
    }

    function renderClusters(clusters) {
      if (!clusters || clusters.length === 0) return ""
      return clusters.map((cl, i) => {
        const srcBadges = cl.items.map(it => {
          const label = SOURCE_LABELS[it.source] || it.source
          const href = it.url ? ` href="${esc(it.url)}" target="_blank" rel="noopener"` : ""
          return `<span class="badge-src badge-${it.source}"><a${href}>${esc(label)} #${it.rank}</a></span>`
        }).join("")
        return `
          <div class="cluster-row">
            <div class="rank">${i + 1}</div>
            <div>
              <div class="title">${esc(cl.name)}</div>
              <div class="sub">${srcBadges}</div>
            </div>
            <div class="metric">${cl.sources.length}\u00d7</div>
          </div>`
      }).join("")
    }

    // ---- tile categories ---------------------------------------------------
    const TILE_CATEGORIES = {
      wikipedia: ["news", "culture"], hackernews: ["tech"], reddit: ["news", "culture"],
      github: ["tech"], "google-trends": ["news", "global"],
      "cloudflare-radar": ["tech", "global"], gdelt: ["news", "global"],
      youtube: ["entertainment"], steam: ["gaming"],
      bluesky: ["social"], stackoverflow: ["tech"],
    }

    // ---- layout ------------------------------------------------------------
    const ORDER = [
      "hackernews", "github", "stackoverflow",
      "google-trends", "gdelt", "wikipedia",
      "reddit", "bluesky",
      "youtube", "steam",
      "cloudflare-radar",
    ]

    // ---- hash routing ------------------------------------------------------
    function parseHash() {
      const params = new URLSearchParams(location.hash.slice(1))
      return {
        view: params.get("view") || "today",
        filter: params.get("filter") || "all",
        history: params.get("history") || null,
      }
    }

    function setHash(updates) {
      const current = parseHash()
      const merged = { ...current, ...updates }
      const params = new URLSearchParams()
      if (merged.view !== "today") params.set("view", merged.view)
      if (merged.filter !== "all") params.set("filter", merged.filter)
      if (merged.history) params.set("history", merged.history)
      const str = params.toString()
      history.pushState(null, "", str ? `#${str}` : window.location.pathname)
      route()
    }

    // ---- data fetching (cached) --------------------------------------------
    let _latestData = null
    let _historyData = null

    async function fetchData() {
      const res = await fetch(`data/latest.json?t=${Date.now()}`)
      if (!res.ok) throw new Error(`latest.json: HTTP ${res.status}`)
      _latestData = await res.json()
      document.getElementById("generated").textContent = `updated ${rel(_latestData.generated_at)}`
      _historyData = await loadHistory(7)
    }

    // ---- grid view ---------------------------------------------------------
    function showGridView(state) {
      const latest = _latestData
      if (!latest) return

      // Show filter bar and brief
      document.getElementById("filter-bar").style.display = ""
      const briefEl = document.getElementById("brief")
      if (latest.brief && state.view === "today") {
        document.getElementById("brief-text").textContent = latest.brief
        briefEl.style.display = ""
      } else {
        briefEl.style.display = "none"
      }

      // Sync view toggle
      document.querySelectorAll(".view-toggle button").forEach(b =>
        b.classList.toggle("active", b.dataset.view === state.view)
      )

      // Sync filter bar
      document.querySelectorAll(".filter-bar button").forEach(b =>
        b.classList.toggle("active", b.dataset.filter === state.filter)
      )

      const grid = document.getElementById("grid")
      grid.innerHTML = ""

      // Cluster tile (full-width, today view only)
      if (state.view === "today" && state.filter === "all" && latest.clusters?.length > 0) {
        const clusterTile = document.createElement("section")
        clusterTile.className = "tile tile-wide"
        clusterTile.innerHTML = `
          <header>
            <h2>Cross-source hits</h2>
            <span class="stamp">${latest.clusters.length} topics in 2+ sources</span>
          </header>
          <div class="body">${renderClusters(latest.clusters)}</div>
        `
        grid.appendChild(clusterTile)
      }

      for (const key of ORDER) {
        const data = latest.sources[key]
        if (!data) continue

        const cats = TILE_CATEGORIES[key] || []

        // Category filter
        if (state.filter !== "all" && !cats.includes(state.filter)) continue

        const tile = document.createElement("section")
        tile.className = "tile"
        tile.setAttribute("data-categories", cats.join(" "))

        const label = data.label || key
        const stamp = data.error ? "error" : (data.data_date ? `for ${data.data_date}` : rel(data.fetched_at))

        let body = ""
        if (data.error) {
          tile.classList.add("error")
          body = `<div>Failed to load: ${esc(data.error)}</div>`
        } else if (!data.items || data.items.length === 0) {
          if ((key === "cloudflare-radar" || key === "youtube") && data.configured === false) {
            body = renderers[key](data, [])
          } else {
            tile.classList.add("empty")
            body = `<div>No items.</div>`
          }
        } else if (state.view === "week") {
          const weekItems = aggregateWeek(key, _historyData)
          const ann = annotate(key, weekItems, _historyData)
          body = renderers[key]({ ...data, items: weekItems }, ann)
        } else {
          const ann = annotate(key, data.items, _historyData)
          body = renderers[key](data, ann)
        }

        tile.innerHTML = `
          <header>
            <h2>${esc(label)}</h2>
            <span class="stamp">${state.view === "week" ? "this week" : esc(stamp)}</span>
          </header>
          <div class="body">${body}</div>
        `
        grid.appendChild(tile)
      }
    }

    // ---- history view ------------------------------------------------------
    function renderBarChart(dailyCounts) {
      if (!dailyCounts.length) return "<p style='color:var(--muted)'>No data found.</p>"
      const maxCount = Math.max(...dailyCounts.map(d => d.count), 1)
      const barW = Math.max(4, Math.floor(600 / dailyCounts.length) - 2)
      const gap = 2
      const h = 160
      let bars = ""
      dailyCounts.forEach((d, i) => {
        const barH = Math.max(1, (d.count / maxCount) * (h - 24))
        const x = i * (barW + gap)
        const y = h - 24 - barH
        bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="var(--accent)" opacity="0.8" rx="1"><title>${d.date}: ${d.count} match${d.count !== 1 ? "es" : ""}</title></rect>`
        if (i % 7 === 0) {
          bars += `<text x="${x}" y="${h - 6}" font-size="9" fill="var(--muted)" font-family="var(--mono)">${d.date.slice(5)}</text>`
        }
      })
      const totalW = dailyCounts.length * (barW + gap)
      return `<svg width="100%" viewBox="0 0 ${totalW} ${h}" preserveAspectRatio="xMinYMid meet">${bars}</svg>`
    }

    async function showHistoryView(keyword) {
      document.getElementById("brief").style.display = "none"
      document.getElementById("filter-bar").style.display = "none"

      const grid = document.getElementById("grid")
      grid.innerHTML = '<div class="history-view"><p style="color:var(--muted)">Loading history...</p></div>'

      const allSources = Object.keys(_latestData?.sources || {})
      const days = 30
      const today = new Date()
      const dates = []
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(today)
        d.setUTCDate(d.getUTCDate() - i)
        dates.push(d.toISOString().slice(0, 10))
      }

      const matchesByDate = {}
      const allMatches = []
      const lowerKeyword = keyword.toLowerCase()
      for (const date of dates) matchesByDate[date] = 0

      const fetches = []
      for (const source of allSources) {
        for (const date of dates) {
          fetches.push(
            fetch(`data/history/${source}/${date}.json`, { cache: "no-store" })
              .then(r => r.ok ? r.json() : null)
              .catch(() => null)
              .then(data => {
                if (!data?.items) return
                for (const item of data.items) {
                  if ((item.title || "").toLowerCase().includes(lowerKeyword)) {
                    matchesByDate[date] = (matchesByDate[date] || 0) + 1
                    allMatches.push({ ...item, source, date })
                  }
                }
              })
          )
        }
      }

      await Promise.all(fetches)

      const dailyCounts = dates.map(date => ({ date, count: matchesByDate[date] || 0 }))
      const topItems = allMatches
        .sort((a, b) => (a.rank || 99) - (b.rank || 99))
        .slice(0, 20)

      grid.innerHTML = `
        <div class="history-view">
          <div class="history-header">
            <a href="#" class="back-link" id="history-back">\u2190 Back to dashboard</a>
            <h2>History: \u201c${esc(keyword)}\u201d</h2>
            <p class="history-meta">Last ${days} days across ${allSources.length} sources \u00b7 ${allMatches.length} total matches</p>
          </div>
          <div class="history-chart">${renderBarChart(dailyCounts)}</div>
          <div class="history-items">
            <h3>Top matching items</h3>
            ${topItems.map(it => `
              <div class="item">
                <div class="rank" style="font-size:10px">${esc(it.source)}</div>
                <div>
                  <div class="title"><a href="${esc(it.url || "#")}" target="_blank" rel="noopener">${esc(it.title)}</a></div>
                  <div class="sub">${esc(it.date)}</div>
                </div>
              </div>
            `).join("")}
            ${topItems.length === 0 ? '<p style="color:var(--muted);padding:16px">No matching items found.</p>' : ""}
          </div>
        </div>
      `

      document.getElementById("history-back").addEventListener("click", (e) => {
        e.preventDefault()
        setHash({ history: null })
      })
    }

    // ---- routing -----------------------------------------------------------
    function route() {
      const state = parseHash()
      if (state.history) {
        showHistoryView(state.history)
      } else {
        showGridView(state)
      }
    }

    window.addEventListener("hashchange", route)

    // ---- search ------------------------------------------------------------
    let _searchTimer = null
    document.getElementById("search").addEventListener("input", (e) => {
      clearTimeout(_searchTimer)
      _searchTimer = setTimeout(() => {
        const query = e.target.value.trim().toLowerCase()
        document.querySelectorAll(".tile .item").forEach(item => {
          const text = (item.querySelector(".title")?.textContent || "") +
            " " + (item.querySelector(".sub")?.textContent || "")
          item.classList.toggle("search-hidden", query.length > 0 && !text.toLowerCase().includes(query))
        })
        // Mark tiles with all items hidden
        document.querySelectorAll(".tile:not(.tile-wide)").forEach(tile => {
          const items = tile.querySelectorAll(".item")
          const visible = tile.querySelectorAll(".item:not(.search-hidden)")
          tile.classList.toggle("filtered-empty", items.length > 0 && visible.length === 0)
        })
      }, 100)
    })

    // Enter in search -> history view
    document.getElementById("search").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const q = e.target.value.trim()
        if (q) setHash({ history: q })
      }
    })

    // ---- view toggle -------------------------------------------------------
    document.querySelector(".view-toggle").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-view]")
      if (!btn) return
      setHash({ view: btn.dataset.view })
    })

    // ---- filter bar --------------------------------------------------------
    document.getElementById("filter-bar").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-filter]")
      if (!btn) return
      setHash({ filter: btn.dataset.filter })
    })

    // ---- init --------------------------------------------------------------
    fetchData().then(() => route()).catch((err) => {
      document.getElementById("grid").innerHTML =
        `<div style="padding:40px;color:var(--muted)">Failed to load data: ${esc(err.message)}</div>`
    })

    // Re-load when the tab regains focus (but not more than once per 30s).
    let lastLoad = Date.now()
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && Date.now() - lastLoad > 30_000) {
        lastLoad = Date.now()
        fetchData().then(() => route()).catch(() => {})
      }
    })
  </script>
</body>
</html>
