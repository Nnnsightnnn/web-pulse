<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web Pulse — what the world is doing on the web</title>
  <meta name="description" content="A daily snapshot of what people are reading, discussing, and building across the web." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04080E;
      --card: rgba(8,20,36,.35);
      --card-hover: rgba(14,30,54,.5);
      --border: #1B3358;
      --text: #E8EEF2;
      --muted: #9FB2C6;
      --dim: #5E7692;
      --accent: #5EEAD4;
      --up: #A7F3D0;
      --down: #FB7185;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
      --serif: 'Fraunces', serif;
      --deep: #081424;
      --mid: #0E1E36;
      --surf: #14284A;
      --line2: #24426F;
      --dimmer: #38516F;
      --cyan: #5EEAD4;
      --magenta: #F472B6;
      --plankton: #A7F3D0;
      --gold: #FCD34D;
      --coral: #FB7185;
      --violet: #A78BFA;
      --amber: #FBBF24;
      --salmon: #FA8072;
      --indigo: #818CF8;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(1200px 800px at 85% -10%, rgba(94,234,212,.06), transparent 55%),
        radial-gradient(1000px 700px at 5% 110%, rgba(244,114,182,.05), transparent 60%),
        linear-gradient(180deg, #020509 0%, var(--bg) 30%, var(--bg) 100%);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(to right, rgba(36,66,111,.10) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(36,66,111,.10) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(1400px 900px at 50% 50%, black, transparent 90%);
      -webkit-mask-image: radial-gradient(1400px 900px at 50% 50%, black, transparent 90%);
    }
    header.site {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      background: rgba(4,8,14,.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header.site h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    header.site h1 span.dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--cyan);
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: 2px;
      box-shadow: 0 0 8px var(--cyan);
    }
    header.site .meta {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    main {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
      max-width: 1600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .tile {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 400px;
      max-height: 600px;
      transition: border-color 200ms ease;
    }
    .tile:hover { border-color: var(--line2); }
    .tile header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .tile h2 {
      margin: 0;
      font-family: var(--mono);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .tile .stamp {
      font-family: var(--mono);
      font-size: 9.5px;
      color: var(--dim);
      white-space: nowrap;
      letter-spacing: 0.04em;
    }
    .tile .body {
      overflow-y: auto;
      flex: 1;
    }
    .tile .body::-webkit-scrollbar { width: 6px; }
    .tile .body::-webkit-scrollbar-track { background: transparent; }
    .tile .body::-webkit-scrollbar-thumb { background: var(--dimmer); border-radius: 3px; }

    .item {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: 10px;
      padding: 8px 16px;
      border-bottom: 1px dashed rgba(36,66,111,.55);
      align-items: start;
      transition: background 150ms ease;
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: rgba(14,30,54,.4); }
    .item .rank {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--dim);
      padding-top: 1px;
    }
    .item .title {
      font-size: 12.5px;
      line-height: 1.4;
    }
    .item .title a {
      color: var(--text);
      text-decoration: none;
      transition: color 150ms ease;
    }
    .item .title a:hover { color: var(--cyan); }
    .item .sub {
      margin-top: 3px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.02em;
    }
    .item .metric {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 1px;
    }

    .tile.error .body, .tile.empty .body {
      padding: 20px 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .sparkline {
      display: inline-block;
      vertical-align: middle;
      margin-left: 6px;
    }
    .sparkline path.line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.2;
      opacity: 0.75;
    }

    .delta { font-family: var(--mono); font-size: 10px; padding: 1px 5px; border-radius: 2px; margin-left: 6px; }
    .delta.up   { color: var(--up); }
    .delta.down { color: var(--down); }
    .delta.flat { color: var(--dim); }
    .badge { font-family: var(--mono); font-size: 9px; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; margin-left: 6px; letter-spacing: 0.06em; }
    .badge.new    { background: rgba(94,234,212,.15); color: var(--cyan); border: 1px solid rgba(94,234,212,.4); }
    .badge.streak { background: rgba(36,66,111,.35); color: var(--muted); border: 1px solid var(--border); }

    .blob-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
    .blob-container .blob-more {
      position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
      font-family: var(--mono); font-size: 9px; color: var(--dim);
      letter-spacing: 0.04em; white-space: nowrap; pointer-events: none;
    }
    .item.blob {
      /* reset .item base styles that cause oval distortion */
      display: block; grid-template-columns: none; gap: 0;
      padding: 0; border-bottom: none; align-items: initial;
      background: none !important;
      /* blob positioning */
      position: absolute; border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: transform 180ms ease;
      z-index: 1; visibility: hidden;
      aspect-ratio: 1 / 1;
    }
    .item.blob:last-child { border-bottom: none; }
    .item.blob:hover {
      transform: translate(-50%, -50%) scale(1.12);
      z-index: 10;
    }
    .item.blob .blob-circle {
      width: 100%; height: 100%; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; text-decoration: none; padding: 8px; overflow: hidden;
      border: 1.5px solid; transition: border-color 180ms ease, box-shadow 180ms ease;
      aspect-ratio: 1 / 1;
    }
    .item.blob:hover .blob-circle {
      box-shadow: 0 0 24px var(--blob-glow), inset 0 0 16px var(--blob-glow);
    }
    .item.blob .blob-title {
      font-size: 10px; line-height: 1.15; color: var(--text); font-weight: 500;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      max-width: 90%; word-break: break-word;
    }
    .item.blob .blob-sub {
      font-family: var(--mono); font-size: 8px; color: var(--muted);
      margin-top: 2px; white-space: nowrap; opacity: .8;
    }
    .item.blob .blob-badges {
      position: absolute; top: -2px; right: -2px;
      display: flex; gap: 2px; z-index: 2;
    }
    .item.blob .blob-badges .badge { margin-left: 0; font-size: 7px; padding: 1px 4px; }
    .item.blob .blob-badges .delta { margin-left: 0; font-size: 8px; padding: 0 3px; }
    .item.blob .blob-tip {
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%); background: var(--deep);
      border: 1px solid var(--line2); border-radius: 4px;
      padding: 6px 10px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity 150ms ease;
      z-index: 20; font-size: 11px; color: var(--text);
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
    }
    .item.blob .blob-tip span { display: block; font-family: var(--mono); font-size: 9px; color: var(--dim); margin-top: 2px; }
    .item.blob:hover .blob-tip { opacity: 1; }
    .item.blob.search-hidden { display: none; }

    .display-toggle { display: flex; gap: 4px; margin-left: 8px; padding-left: 8px; border-left: 1px solid var(--border); }
    .display-toggle button {
      font-family: var(--mono); font-size: 10px; padding: 3px 10px;
      border: 1px solid var(--border); border-radius: 2px;
      background: transparent; color: var(--muted); cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.08em; transition: all 150ms ease;
    }
    .display-toggle button:hover { color: var(--text); }
    .display-toggle button.active { background: rgba(94,234,212,.06); color: var(--cyan); border-color: rgba(94,234,212,.4); }

    .view-toggle { display: flex; gap: 4px; }
    .view-toggle button {
      font-family: var(--mono); font-size: 10px; padding: 3px 10px;
      border: 1px solid var(--border); border-radius: 2px;
      background: transparent; color: var(--muted); cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.08em; transition: all 150ms ease;
    }
    .view-toggle button:hover { color: var(--text); }
    .view-toggle button.active { background: rgba(94,234,212,.06); color: var(--cyan); border-color: rgba(94,234,212,.4); }

    .tile-wide { grid-column: 1 / -1; max-height: 320px; }
    .cluster-row {
      display: grid; grid-template-columns: 24px 1fr auto; gap: 10px;
      padding: 8px 16px; border-bottom: 1px dashed rgba(36,66,111,.55); align-items: start;
      transition: background 150ms ease;
    }
    .cluster-row:last-child { border-bottom: none; }
    .cluster-row:hover { background: rgba(14,30,54,.4); }
    .badge-src {
      display: inline-flex; font-family: var(--mono); font-size: 10px;
      padding: 2px 6px; border-radius: 2px; margin-right: 4px; margin-top: 3px;
      border: 1px solid;
    }
    .badge-src a { color: inherit; text-decoration: none; }
    .badge-src a:hover { text-decoration: underline; }
    .badge-wikipedia        { color: var(--plankton); background: rgba(167,243,208,.06); border-color: rgba(167,243,208,.4); }
    .badge-hackernews       { color: var(--amber); background: rgba(251,191,36,.06); border-color: rgba(251,191,36,.4); }
    .badge-reddit           { color: var(--coral); background: rgba(251,113,133,.06); border-color: rgba(251,113,133,.4); }
    .badge-github           { color: var(--muted); background: rgba(159,178,198,.06); border-color: rgba(159,178,198,.3); }
    .badge-google-trends    { color: var(--cyan); background: rgba(94,234,212,.06); border-color: rgba(94,234,212,.4); }
    .badge-cloudflare-radar { color: var(--violet); background: rgba(167,139,250,.06); border-color: rgba(167,139,250,.4); }
    .badge-mediastack      { color: var(--cyan); background: rgba(94,234,212,.06); border-color: rgba(94,234,212,.4); }
    .badge-stackoverflow   { color: var(--gold); background: rgba(252,211,77,.06); border-color: rgba(252,211,77,.4); }
    .badge-steam           { color: var(--plankton); background: rgba(167,243,208,.06); border-color: rgba(167,243,208,.4); }
    .badge-youtube         { color: var(--magenta); background: rgba(244,114,182,.06); border-color: rgba(244,114,182,.4); }
    .badge-bluesky         { color: var(--violet); background: rgba(167,139,250,.06); border-color: rgba(167,139,250,.4); }
    .badge-mastodon-trending { color: var(--indigo); background: rgba(129,140,248,.06); border-color: rgba(129,140,248,.4); }
    .badge-product-hunt      { color: var(--salmon); background: rgba(250,128,114,.06); border-color: rgba(250,128,114,.4); }

    .filter-bar {
      padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,20,36,.5);
      position: relative; z-index: 1;
    }
    .filter-bar button {
      font-family: var(--mono); font-size: 10px; padding: 3px 10px;
      border-radius: 2px; border: 1px solid var(--line2);
      background: rgba(8,20,36,.4); color: var(--muted); cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.12em; transition: all 150ms ease;
    }
    .filter-bar button:hover { border-color: rgba(94,234,212,.4); color: var(--text); }
    .filter-bar button.active { background: rgba(94,234,212,.06); color: var(--cyan); border-color: rgba(94,234,212,.4); }

    #search {
      font-family: var(--mono); font-size: 11px; padding: 5px 12px;
      border: 1px solid var(--border); border-radius: 3px;
      background: rgba(4,8,14,.55); color: var(--text); width: 200px; outline: none;
      letter-spacing: 0.02em; transition: border-color 150ms ease;
    }
    #search:focus { border-color: var(--cyan); box-shadow: 0 0 6px rgba(94,234,212,.2); }
    .item.search-hidden { display: none; }
    .tile.filtered-empty .body::after {
      content: "No matches"; display: block; padding: 20px 16px;
      color: var(--muted); font-size: 13px;
    }

    .brief {
      max-width: 1600px; margin: 0 auto; padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(94,234,212,.04), transparent);
      position: relative; z-index: 1;
    }
    .brief-label {
      margin: 0 0 4px; font-family: var(--mono); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.18em; color: var(--cyan);
    }
    .brief-text { margin: 0; font-family: var(--serif); font-size: 14px; line-height: 1.6; color: var(--text); font-style: italic; }

    .history-view { max-width: 1000px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
    .history-header { margin-bottom: 24px; }
    .back-link { font-family: var(--mono); font-size: 10.5px; color: var(--dim); text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase; }
    .back-link:hover { color: var(--cyan); }
    .history-view h2 { font-family: var(--serif); font-size: 22px; font-weight: 400; margin: 8px 0 4px; }
    .history-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); margin: 0; letter-spacing: 0.02em; }
    .history-chart {
      background: rgba(8,20,36,.35); border: 1px solid var(--border);
      border-radius: 3px; padding: 20px; margin-bottom: 20px;
    }
    .history-items {
      background: rgba(8,20,36,.35); border: 1px solid var(--border);
      border-radius: 3px; overflow: hidden;
    }
    .history-items h3 {
      font-family: var(--mono); font-size: 10.5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.18em;
      color: var(--muted); padding: 14px 16px; margin: 0; border-bottom: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      #search { width: 100%; }
      header.site { flex-direction: column; align-items: stretch; }
      .filter-bar { padding: 8px 12px; }
    }

    footer {
      padding: 20px 24px 32px;
      text-align: center;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.04em;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--cyan); }

    /* ---- FAB Navigation ---- */
    .fab-nav {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      pointer-events: none;
    }
    .fab-nav-toggle {
      pointer-events: auto;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--line2);
      background: var(--deep);
      color: var(--cyan);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.5), 0 0 12px rgba(94,234,212,.15);
      transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .fab-nav-toggle:hover {
      border-color: var(--cyan);
      box-shadow: 0 4px 20px rgba(0,0,0,.5), 0 0 20px rgba(94,234,212,.25);
      transform: scale(1.08);
    }
    .fab-nav.open .fab-nav-toggle {
      background: var(--surf);
      border-color: var(--cyan);
    }
    .fab-nav-panel {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      background: var(--deep);
      border: 1px solid var(--line2);
      border-radius: 4px;
      padding: 6px;
      max-height: 70vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
      opacity: 0;
      transform: translateY(8px) scale(0.95);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
      visibility: hidden;
    }
    .fab-nav.open .fab-nav-panel {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
      visibility: visible;
    }
    .fab-nav-panel::-webkit-scrollbar { width: 4px; }
    .fab-nav-panel::-webkit-scrollbar-track { background: transparent; }
    .fab-nav-panel::-webkit-scrollbar-thumb { background: var(--dimmer); border-radius: 2px; }
    .fab-nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 10px;
      border: none;
      border-radius: 2px;
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: background 150ms ease, color 150ms ease;
      text-align: left;
    }
    .fab-nav-item:hover {
      background: rgba(94,234,212,.06);
      color: var(--cyan);
    }
    .fab-nav-top {
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
      padding-bottom: 8px;
    }
    .fab-nav-icon {
      font-size: 12px;
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .fab-nav.fab-hidden { display: none; }
    @media (max-width: 600px) {
      .fab-nav { bottom: 16px; right: 16px; }
      .fab-nav-toggle { width: 44px; height: 44px; }
      .fab-nav-panel { max-height: 60vh; }
    }
  </style>
</head>
<body>
  <header class="site">
    <h1><span class="dot"></span>Web Pulse</h1>
    <div style="display:flex;align-items:center;gap:0">
      <div class="view-toggle">
        <button data-view="today" class="active">Today</button>
        <button data-view="week">This week</button>
      </div>
      <div class="display-toggle">
        <button data-display="list" class="active">List</button>
        <button data-display="bubble">Bubble</button>
      </div>
    </div>
    <input type="search" id="search" placeholder="Search everything..." autocomplete="off" />
    <div class="meta" id="generated">—</div>
  </header>

  <nav class="filter-bar" id="filter-bar">
    <button data-filter="all" class="active">All</button>
    <button data-filter="tech">Tech</button>
    <button data-filter="news">News</button>
    <button data-filter="entertainment">Entertainment</button>
    <button data-filter="gaming">Gaming</button>
    <button data-filter="social">Social</button>
    <button data-filter="global">Global</button>
  </nav>

  <section class="brief" id="brief" style="display:none">
    <p class="brief-label">Today's brief</p>
    <p class="brief-text" id="brief-text"></p>
  </section>

  <main id="grid"></main>

  <footer>
    auto-refreshes daily · <a id="repo-link" href="#" target="_blank" rel="noopener">source</a>
  </footer>

  <script type="module">
    // ---- helpers -----------------------------------------------------------
    const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]))
    const fmt = (n) => {
      if (n == null) return ""
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, "") + "M"
      if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, "") + "k"
      return String(n)
    }
    const rel = (iso) => {
      if (!iso) return "\u2014"
      const d = new Date(iso)
      const diff = (Date.now() - d.getTime()) / 1000
      if (diff < 60) return `${Math.round(diff)}s ago`
      if (diff < 3600) return `${Math.round(diff / 60)}m ago`
      if (diff < 86400) return `${Math.round(diff / 3600)}h ago`
      return `${Math.round(diff / 86400)}d ago`
    }

    // ---- sparkline ---------------------------------------------------------
    function sparkline(values, w = 48, h = 16) {
      if (!values || values.length < 2) return ""
      const min = Math.min(...values)
      const max = Math.max(...values)
      const range = max - min || 1
      const step = w / (values.length - 1)
      const pts = values.map((v, i) => {
        const x = i * step
        const y = h - ((v - min) / range) * h
        return `${x.toFixed(1)},${y.toFixed(1)}`
      })
      return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path class="line" d="M${pts.join(" L")}"/></svg>`
    }

    // ---- identity & metrics ------------------------------------------------
    function itemKey(source, item) {
      switch (source) {
        case "wikipedia":        return item.title
        case "hackernews":       return `hn:${item.url || item.hn_url}`
        case "reddit":           return `reddit:${item.url}`
        case "github":           return item.title
        case "google-trends":    return item.title.toLowerCase()
        case "cloudflare-radar": return item.title
        case "mediastack":       return item.url
        case "mastodon-trending": return item.url
        case "product-hunt":     return item.url
        case "stackoverflow":    return item.url
        case "steam":            return item.title
        case "youtube":          return item.url
        case "bluesky":          return item.url
        default:                 return item.title
      }
    }

    function metricFor(source, item) {
      switch (source) {
        case "wikipedia":        return item.views
        case "hackernews":       return item.score
        case "reddit":           return item.score
        case "github":           return item.stars_today
        case "google-trends":    return item.geos?.length
        case "cloudflare-radar": return undefined
        case "mediastack":       return undefined
        case "mastodon-trending": return item.likes
        case "product-hunt":     return item.votes_count
        case "stackoverflow":    return item.score
        case "steam":            return item.players
        case "youtube":          return item.views
        case "bluesky":          return item.likes
        default:                 return undefined
      }
    }

    // ---- blob helpers -------------------------------------------------------
    const SOURCE_COLORS = {
      wikipedia: '#A7F3D0', hackernews: '#FBBF24', reddit: '#FB7185',
      github: '#9FB2C6', 'google-trends': '#5EEAD4', 'cloudflare-radar': '#A78BFA',
      mediastack: '#5EEAD4', 'mastodon-trending': '#818CF8', 'product-hunt': '#FA8072',
      stackoverflow: '#FCD34D', steam: '#A7F3D0',
      youtube: '#F472B6', bluesky: '#A78BFA',
    }

    function blobSubtext(source, item) {
      const v = metricFor(source, item)
      if (v == null) return '#' + item.rank
      switch (source) {
        case 'wikipedia': return fmt(v) + ' views'
        case 'hackernews': return v + ' pts'
        case 'reddit': return fmt(v)
        case 'github': return '+' + fmt(v) + ' stars'
        case 'google-trends': return (item.geos?.length || 0) + ' countries'
        case 'stackoverflow': return v + ' score'
        case 'steam': return fmt(v) + ' players'
        case 'youtube': return fmt(v) + ' views'
        case 'bluesky': return fmt(v) + ' likes'
        case 'mastodon-trending': return fmt(v) + ' likes'
        case 'product-hunt': return fmt(v) + ' votes'
        default: return '#' + item.rank
      }
    }

    function packCircles(circles, W, H) {
      const placed = []
      const cx = W / 2, cy = H / 2
      const pad = 3
      for (const c of circles) {
        if (placed.length === 0) {
          placed.push({ ...c, x: cx, y: cy })
          continue
        }
        let bestX = cx, bestY = cy, bestDist = Infinity, found = false
        // tighter spiral: smaller step for denser packing
        for (let t = 0; t < 2000; t++) {
          const angle = t * 0.2
          const dist = t * 0.18
          const x = cx + dist * Math.cos(angle)
          const y = cy + dist * Math.sin(angle)
          if (x - c.r < pad || x + c.r > W - pad || y - c.r < pad || y + c.r > H - pad) continue
          let ok = true
          for (const p of placed) {
            const dx = x - p.x, dy = y - p.y
            if (dx * dx + dy * dy < (c.r + p.r + pad) ** 2) { ok = false; break }
          }
          if (ok) {
            const d2 = (x - cx) ** 2 + (y - cy) ** 2
            if (d2 < bestDist) { bestX = x; bestY = y; bestDist = d2; found = true }
            // accept first good position near center
            if (d2 < (c.r * 2) ** 2) break
          }
        }
        if (found) placed.push({ ...c, x: bestX, y: bestY })
      }
      return placed
    }

    const BLOB_MAX = 15
    const BLOB_MAX_R = 58
    const BLOB_MIN_R = 16

    function renderBlobView(sourceKey, data, items) {
      if (!items || items.length === 0) return ''
      const color = SOURCE_COLORS[sourceKey] || '#5EEAD4'
      const show = items.slice(0, BLOB_MAX)
      const extra = items.length - show.length
      const values = show.map(it => {
        let v = metricFor(sourceKey, it)
        if (v == null || v <= 0) v = (show.length - it.rank + 1) / show.length
        return v
      })
      const maxVal = Math.max(...values, 1)
      const radii = values.map(v => BLOB_MIN_R + (BLOB_MAX_R - BLOB_MIN_R) * Math.sqrt(v / maxVal))

      let html = show.map((it, i) => {
        const r = radii[i]
        const d = r * 2
        const sub = blobSubtext(sourceKey, it)
        const bg = `radial-gradient(circle at 30% 30%, ${color}50, ${color}18 60%, ${color}06 100%)`
        const borderC = `${color}66`
        const showText = r >= 24
        const titleHtml = showText
          ? `<span class="blob-title">${esc(it.title)}</span><span class="blob-sub">${esc(sub)}</span>`
          : ''
        const tipHtml = r < 24
          ? `<div class="blob-tip">${esc(it.title)}<span>${esc(sub)}</span></div>`
          : ''
        const bdg = badges(it)
        const badgeHtml = bdg ? `<div class="blob-badges">${bdg}</div>` : ''
        const url = it.url || it.hn_url || it.news_url || '#'
        return `<div class="item blob" style="width:${d}px;height:${d}px;--blob-glow:${color}55" data-blob-idx="${i}">
          <a class="blob-circle" href="${esc(url)}" target="_blank" rel="noopener"
             style="background:${bg};border-color:${borderC}">
            ${titleHtml}
          </a>
          ${tipHtml}${badgeHtml}
        </div>`
      }).join('')

      if (extra > 0) html += `<div class="blob-more">and ${extra} more</div>`
      return `<div class="blob-container" data-source="${esc(sourceKey)}">${html}</div>`
    }

    function layoutBlobs() {
      document.querySelectorAll('.blob-container').forEach(container => {
        const W = container.clientWidth || 360
        const H = container.clientHeight || 400
        const blobs = [...container.querySelectorAll('.item.blob')]
        if (blobs.length === 0) return
        const circles = blobs.map(el => ({
          r: parseInt(el.style.width) / 2,
          el,
        }))
        circles.sort((a, b) => b.r - a.r)
        const packed = packCircles(circles, W, H)
        if (packed.length === 0) return
        // re-center the packed group within the container
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity
        for (const p of packed) {
          minX = Math.min(minX, p.x - p.r)
          maxX = Math.max(maxX, p.x + p.r)
          minY = Math.min(minY, p.y - p.r)
          maxY = Math.max(maxY, p.y + p.r)
        }
        const groupW = maxX - minX, groupH = maxY - minY
        const offX = (W - groupW) / 2 - minX
        const offY = (H - groupH) / 2 - minY
        for (const p of packed) {
          p.el.style.left = (p.x + offX) + 'px'
          p.el.style.top = (p.y + offY) + 'px'
          p.el.style.visibility = 'visible'
        }
      })
    }

    // ---- badges ------------------------------------------------------------
    function badges(item) {
      let html = ""
      if (item.delta != null) {
        if (item.delta < 0) html += `<span class="delta up">\u2191${Math.abs(item.delta)}</span>`
        else if (item.delta > 0) html += `<span class="delta down">\u2193${item.delta}</span>`
        else html += `<span class="delta flat">\u2014</span>`
      }
      if (item.isNew) html += `<span class="badge new">NEW</span>`
      if (item.streak >= 3) html += `<span class="badge streak">streak ${item.streak}d</span>`
      return html
    }

    function rankSpark(item) {
      const valid = item.series?.filter(v => v != null) || []
      // negate ranks so lower rank (better) = higher sparkline position
      return valid.length >= 2 ? sparkline(valid.map(v => -v)) : ""
    }

    // ---- load history for all sources --------------------------------------
    const _historyCache = new Map()

    async function loadHistory(days = 7) {
      const result = {}
      const today = new Date()
      const fetches = []

      for (const source of ORDER) {
        result[source] = {}
        for (let i = days - 1; i >= 0; i--) {
          const d = new Date(today)
          d.setUTCDate(d.getUTCDate() - i)
          const stamp = d.toISOString().slice(0, 10)
          const url = `data/history/${source}/${stamp}.json`
          fetches.push({ source, stamp, url })
        }
      }

      const responses = await Promise.allSettled(
        fetches.map(async ({ url }) => {
          if (_historyCache.has(url)) return _historyCache.get(url)
          const r = await fetch(url, { cache: "no-store" })
          if (!r.ok) return null
          const data = await r.json()
          _historyCache.set(url, data)
          return data
        })
      )

      responses.forEach((r, idx) => {
        if (r.status !== "fulfilled" || !r.value) return
        const { source, stamp } = fetches[idx]
        const data = r.value
        for (const item of data.items || []) {
          const key = itemKey(source, item)
          if (!result[source][key]) result[source][key] = []
          result[source][key].push({
            date: stamp,
            rank: item.rank,
            metric: metricFor(source, item),
            _item: item,
          })
        }
      })

      return result
    }

    // ---- annotate items with history data ----------------------------------
    function annotate(source, todayItems, history) {
      const sourceHist = history[source] || {}

      // Collect all dates present in this source's history
      const allDates = new Set()
      for (const entries of Object.values(sourceHist)) {
        for (const e of entries) allDates.add(e.date)
      }
      const sortedDates = [...allDates].sort()
      const todayStr = new Date().toISOString().slice(0, 10)

      return todayItems.map((item) => {
        const key = itemKey(source, item)
        const entries = sourceHist[key] || []

        // Find yesterday's entry (most recent history entry before today)
        const pastEntries = entries.filter(e => e.date < todayStr)
        const yesterday = pastEntries.length > 0 ? pastEntries[pastEntries.length - 1] : null
        const delta = yesterday ? item.rank - yesterday.rank : null

        // isNew: not present in any of last 3 days of past history
        const pastDates = sortedDates.filter(d => d < todayStr)
        const last3Days = pastDates.slice(-3)
        const isNew = last3Days.length > 0 &&
          !pastEntries.some(e => last3Days.includes(e.date))

        // streak: consecutive days including today, walking backwards
        let streak = 1
        const entryDates = new Set(entries.map(e => e.date))
        for (let i = pastDates.length - 1; i >= 0; i--) {
          if (entryDates.has(pastDates[i])) streak++
          else break
        }

        // series: rank values for last 7 days, oldest first, null for gaps
        const entryByDate = new Map(entries.map(e => [e.date, e]))
        const last7 = [...pastDates.slice(-6), todayStr]
        const series = last7.map(d => {
          if (d === todayStr) return item.rank
          const e = entryByDate.get(d)
          return e ? e.rank : null
        })

        return { ...item, delta, isNew, streak, series }
      })
    }

    // ---- week aggregation --------------------------------------------------
    function aggregateWeek(source, history) {
      const sourceHist = history[source] || {}
      const aggregated = []

      for (const [key, entries] of Object.entries(sourceHist)) {
        if (entries.length === 0) continue
        const appearances = entries.length
        const avgRank = entries.reduce((sum, e) => sum + e.rank, 0) / entries.length
        const latest = entries[entries.length - 1]
        aggregated.push({
          ...latest._item,
          appearances,
          avgRank,
          _weekItem: true,
        })
      }

      aggregated.sort((a, b) => b.appearances - a.appearances || a.avgRank - b.avgRank)
      return aggregated.slice(0, 25).map((it, i) => ({ ...it, rank: i + 1 }))
    }

      youtube: ["entertainment"], steam: ["gaming"],
      bluesky: ["social"], stackoverflow: ["tech"],
      "mastodon-trending": ["social"], "product-hunt": ["tech"],
    }

    // ---- layout ------------------------------------------------------------
    const ORDER = [
      "hackernews", "github", "stackoverflow",
      "google-trends", "mediastack", "wikipedia",
      "reddit", "bluesky", "mastodon-trending",
      "youtube", "steam",
      "product-hunt", "cloudflare-radar",
    ]

    // ---- hash routing ------------------------------------------------------
    function parseHash() {
      const params = new URLSearchParams(location.hash.slice(1))
      return {
        view: params.get("view") || "today",
        filter: params.get("filter") || "all",
        history: params.get("history") || null,
        display: params.get("display") || "list",
      }
    }

    function setHash(updates) {
      const current = parseHash()
      const merged = { ...current, ...updates }
      const params = new URLSearchParams()
      if (merged.view !== "today") params.set("view", merged.view)
      if (merged.filter !== "all") params.set("filter", merged.filter)
      if (merged.history) params.set("history", merged.history)
      if (merged.display !== "list") params.set("display", merged.display)
      const str = params.toString()
      history.pushState(null, "", str ? `#${str}` : window.location.pathname)
      route()
    }

    // ---- data fetching (cached) --------------------------------------------
    let _latestData = null
    let _historyData = null

    async function fetchData() {
      const res = await fetch(`data/latest.json?t=${Date.now()}`)
      if (!res.ok) throw new Error(`latest.json: HTTP ${res.status}`)
      _latestData = await res.json()
      document.getElementById("generated").textContent = `updated ${rel(_latestData.generated_at)}`
      _historyData = await loadHistory(7)
    }

    // ---- grid view ---------------------------------------------------------
    function showGridView(state) {
      const latest = _latestData
      if (!latest) return

      // Show filter bar and brief
      document.getElementById("filter-bar").style.display = ""
      const briefEl = document.getElementById("brief")
      if (latest.brief && state.view === "today") {
        document.getElementById("brief-text").textContent = latest.brief
        briefEl.style.display = ""
      } else {
        briefEl.style.display = "none"
      }

      // Sync view toggle
      document.querySelectorAll(".view-toggle button").forEach(b =>
        b.classList.toggle("active", b.dataset.view === state.view)
      )

      // Sync display toggle
      document.querySelectorAll(".display-toggle button").forEach(b =>
        b.classList.toggle("active", b.dataset.display === state.display)
      )

      // Sync filter bar
      document.querySelectorAll(".filter-bar button").forEach(b =>
        b.classList.toggle("active", b.dataset.filter === state.filter)
      )

      const grid = document.getElementById("grid")
      grid.innerHTML = ""

      // Cluster tile (full-width, today view only)
      if (state.view === "today" && state.filter === "all" && latest.clusters?.length > 0) {
        const clusterTile = document.createElement("section")
        clusterTile.className = "tile tile-wide"
        clusterTile.innerHTML = `
          <header>
            <h2>Cross-source hits</h2>
            <span class="stamp">${latest.clusters.length} topics in 2+ sources</span>
          </header>
          <div class="body">${renderClusters(latest.clusters)}</div>
        `
        grid.appendChild(clusterTile)
      }

      for (const key of ORDER) {
        const data = latest.sources[key]
        if (!data) continue

        const cats = TILE_CATEGORIES[key] || []

        // Category filter
        if (state.filter !== "all" && !cats.includes(state.filter)) continue

        const tile = document.createElement("section")
        tile.className = "tile"
        tile.setAttribute("data-categories", cats.join(" "))
        tile.setAttribute("data-source", key)

        const label = data.label || key
        const stamp = data.error ? "error" : (data.data_date ? `for ${data.data_date}` : rel(data.fetched_at))

        let body = ""
        if (data.error) {
          tile.classList.add("error")
          body = `<div>Failed to load: ${esc(data.error)}</div>`
        } else if (!data.items || data.items.length === 0) {
          if ((key === "cloudflare-radar" || key === "youtube" || key === "mediastack" || key === "product-hunt") && data.configured === false) {
            body = renderers[key](data, [])
          } else {
            tile.classList.add("empty")
            body = `<div>No items.</div>`
          }
        } else if (state.view === "week") {
          const weekItems = aggregateWeek(key, _historyData)
          const ann = annotate(key, weekItems, _historyData)
          body = state.display === 'bubble'
            ? renderBlobView(key, data, ann)
            : renderers[key]({ ...data, items: weekItems }, ann)
        } else {
          const ann = annotate(key, data.items, _historyData)
          body = state.display === 'bubble'
            ? renderBlobView(key, data, ann)
            : renderers[key](data, ann)
        }

        tile.innerHTML = `
          <header>
            <h2>${esc(label)}</h2>
            <span class="stamp">${state.view === "week" ? "this week" : esc(stamp)}</span>
          </header>
          <div class="body">${body}</div>
        `
        grid.appendChild(tile)
      }

      if (state.display === 'bubble') requestAnimationFrame(layoutBlobs)

      // Update FAB navigation with currently visible tiles
      const visibleTiles = []
      for (const key of ORDER) {
        const data = latest.sources[key]
        if (!data) continue
        const cats = TILE_CATEGORIES[key] || []
        if (state.filter !== "all" && !cats.includes(state.filter)) continue
        visibleTiles.push({ key, label: SOURCE_LABELS[key] || key })
      }
      updateFabNav(visibleTiles)
    }

    // ---- history view ------------------------------------------------------
    function renderBarChart(dailyCounts) {
      if (!dailyCounts.length) return "<p style='color:var(--muted)'>No data found.</p>"
      const maxCount = Math.max(...dailyCounts.map(d => d.count), 1)
      const barW = Math.max(4, Math.floor(600 / dailyCounts.length) - 2)
      const gap = 2
      const h = 160
      let bars = ""
      dailyCounts.forEach((d, i) => {
        const barH = Math.max(1, (d.count / maxCount) * (h - 24))
        const x = i * (barW + gap)
        const y = h - 24 - barH
        bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="var(--accent)" opacity="0.8" rx="1"><title>${d.date}: ${d.count} match${d.count !== 1 ? "es" : ""}</title></rect>`
        if (i % 7 === 0) {
          bars += `<text x="${x}" y="${h - 6}" font-size="9" fill="var(--muted)" font-family="var(--mono)">${d.date.slice(5)}</text>`
        }
      })
      const totalW = dailyCounts.length * (barW + gap)
      return `<svg width="100%" viewBox="0 0 ${totalW} ${h}" preserveAspectRatio="xMinYMid meet">${bars}</svg>`
    }

    async function showHistoryView(keyword) {
      document.getElementById("brief").style.display = "none"
      document.getElementById("filter-bar").style.display = "none"

      const grid = document.getElementById("grid")
      grid.innerHTML = '<div class="history-view"><p style="color:var(--muted)">Loading history...</p></div>'

      const allSources = Object.keys(_latestData?.sources || {})
      const days = 30
      const today = new Date()
      const dates = []
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(today)
        d.setUTCDate(d.getUTCDate() - i)
        dates.push(d.toISOString().slice(0, 10))
      }

      const matchesByDate = {}
      const allMatches = []
      const lowerKeyword = keyword.toLowerCase()
      for (const date of dates) matchesByDate[date] = 0

      const fetches = []
      for (const source of allSources) {
        for (const date of dates) {
          fetches.push(
            fetch(`data/history/${source}/${date}.json`, { cache: "no-store" })
              .then(r => r.ok ? r.json() : null)
              .catch(() => null)
              .then(data => {
                if (!data?.items) return
                for (const item of data.items) {
                  if ((item.title || "").toLowerCase().includes(lowerKeyword)) {
                    matchesByDate[date] = (matchesByDate[date] || 0) + 1
                    allMatches.push({ ...item, source, date })
                  }
                }
              })
          )
        }
      }

      await Promise.all(fetches)

      const dailyCounts = dates.map(date => ({ date, count: matchesByDate[date] || 0 }))
      const topItems = allMatches
        .sort((a, b) => (a.rank || 99) - (b.rank || 99))
        .slice(0, 20)

      grid.innerHTML = `
        <div class="history-view">
          <div class="history-header">
            <a href="#" class="back-link" id="history-back">\u2190 Back to dashboard</a>
            <h2>History: \u201c${esc(keyword)}\u201d</h2>
            <p class="history-meta">Last ${days} days across ${allSources.length} sources \u00b7 ${allMatches.length} total matches</p>
          </div>
          <div class="history-chart">${renderBarChart(dailyCounts)}</div>
          <div class="history-items">
            <h3>Top matching items</h3>
            ${topItems.map(it => `
              <div class="item">
                <div class="rank" style="font-size:10px">${esc(it.source)}</div>
                <div>
                  <div class="title"><a href="${esc(it.url || "#")}" target="_blank" rel="noopener">${esc(it.title)}</a></div>
                  <div class="sub">${esc(it.date)}</div>
                </div>
              </div>
            `).join("")}
            ${topItems.length === 0 ? '<p style="color:var(--muted);padding:16px">No matching items found.</p>' : ""}
          </div>
        </div>
      `

      document.getElementById("history-back").addEventListener("click", (e) => {
        e.preventDefault()
        setHash({ history: null })
      })
    }

    // ---- routing -----------------------------------------------------------
    function route() {
      const state = parseHash()
      if (state.history) {
        showHistoryView(state.history)
        document.getElementById('fab-nav').classList.add('fab-hidden')
      } else {
        showGridView(state)
      }
    }

    window.addEventListener("hashchange", route)

    // ---- search ------------------------------------------------------------
    let _searchTimer = null
    document.getElementById("search").addEventListener("input", (e) => {
      clearTimeout(_searchTimer)
      _searchTimer = setTimeout(() => {
        const query = e.target.value.trim().toLowerCase()
        document.querySelectorAll(".tile .item").forEach(item => {
          const text = (item.querySelector(".title, .blob-title")?.textContent || "") +
            " " + (item.querySelector(".sub, .blob-sub")?.textContent || "")
          item.classList.toggle("search-hidden", query.length > 0 && !text.toLowerCase().includes(query))
        })
        // Mark tiles with all items hidden
        document.querySelectorAll(".tile:not(.tile-wide)").forEach(tile => {
          const items = tile.querySelectorAll(".item")
          const visible = tile.querySelectorAll(".item:not(.search-hidden)")
          tile.classList.toggle("filtered-empty", items.length > 0 && visible.length === 0)
        })
      }, 100)
    })

    // Enter in search -> history view
    document.getElementById("search").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const q = e.target.value.trim()
        if (q) setHash({ history: q })
      }
    })

    // ---- view toggle -------------------------------------------------------
    document.querySelector(".view-toggle").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-view]")
      if (!btn) return
      setHash({ view: btn.dataset.view })
    })

    // ---- display toggle ----------------------------------------------------
    document.querySelector(".display-toggle").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-display]")
      if (!btn) return
      setHash({ display: btn.dataset.display })
    })

    // ---- filter bar --------------------------------------------------------
    document.getElementById("filter-bar").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-filter]")
      if (!btn) return
      setHash({ filter: btn.dataset.filter })
    })

    // ---- FAB Navigation ----------------------------------------------------
    const fabNav = document.createElement('div')
    fabNav.className = 'fab-nav fab-hidden'
    fabNav.id = 'fab-nav'
    fabNav.innerHTML = `
      <div class="fab-nav-panel" id="fab-nav-panel"></div>
      <button class="fab-nav-toggle" id="fab-nav-toggle" aria-label="Navigate to tile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88"/>
        </svg>
      </button>
    `
    document.body.appendChild(fabNav)

    function toggleFabPanel(forceClose) {
      const fab = document.getElementById('fab-nav')
      if (forceClose || fab.classList.contains('open')) {
        fab.classList.remove('open')
      } else {
        fab.classList.add('open')
      }
    }

    function updateFabNav(visibleTiles) {
      const panel = document.getElementById('fab-nav-panel')
      const fab = document.getElementById('fab-nav')

      let html = `<button class="fab-nav-item fab-nav-top" data-target="top">
        <span class="fab-nav-icon">\u2191</span>
        <span class="fab-nav-label">Top</span>
      </button>`

      for (const { key, label } of visibleTiles) {
        html += `<button class="fab-nav-item" data-target="${esc(key)}">
          <span class="fab-nav-label">${esc(label)}</span>
        </button>`
      }

      panel.innerHTML = html
      fab.classList.toggle('fab-hidden', visibleTiles.length === 0)
    }

    document.getElementById('fab-nav-toggle').addEventListener('click', (e) => {
      e.stopPropagation()
      toggleFabPanel()
    })

    document.getElementById('fab-nav-panel').addEventListener('click', (e) => {
      const btn = e.target.closest('.fab-nav-item')
      if (!btn) return
      const target = btn.dataset.target

      if (target === 'top') {
        window.scrollTo({ top: 0, behavior: 'smooth' })
      } else {
        const tile = document.querySelector(`.tile[data-source="${target}"]`)
        if (tile) {
          const header = document.querySelector('header.site')
          const headerH = header ? header.offsetHeight : 0
          const filterBar = document.getElementById('filter-bar')
          const filterH = (filterBar && filterBar.offsetParent !== null) ? filterBar.offsetHeight : 0
          const top = tile.getBoundingClientRect().top + window.scrollY - headerH - filterH - 8
          window.scrollTo({ top, behavior: 'smooth' })
        }
      }

      toggleFabPanel(true)
    })

    document.addEventListener('click', (e) => {
      const fab = document.getElementById('fab-nav')
      if (!fab.contains(e.target)) toggleFabPanel(true)
    })

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') toggleFabPanel(true)
    })

    // ---- init --------------------------------------------------------------
    fetchData().then(() => route()).catch((err) => {
      document.getElementById("grid").innerHTML =
        `<div style="padding:40px;color:var(--muted)">Failed to load data: ${esc(err.message)}</div>`
    })

    // Re-load when the tab regains focus (but not more than once per 30s).
    let lastLoad = Date.now()
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && Date.now() - lastLoad > 30_000) {
        lastLoad = Date.now()
        fetchData().then(() => route()).catch(() => {})
      }
    })
  </script>
</body>
</html>
